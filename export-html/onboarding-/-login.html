<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnboardingLogin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);

        --font-font-sans: var(--font-sans);
        --font-font-heading: var(--font-heading);
        --font-font-serif: var(--font-serif);
        --font-font-mono: var(--font-mono);
      }

      @theme {
        --radius-xs: calc(var(--radius) - 8px);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
        --radius-2xl: calc(var(--radius) + 8px);
        --radius-3xl: calc(var(--radius) + 16px);
        --radius-4xl: calc(var(--radius) + 24px);
      }

      * {
        corner-shape: var(--shape, round);
      }

      .rounded-full, .rounded-none,
      .rounded-t-full, .rounded-t-none,
      .rounded-r-full, .rounded-r-none,
      .rounded-b-full, .rounded-b-none,
      .rounded-l-full, .rounded-l-none,
      .rounded-s-full, .rounded-s-none,
      .rounded-e-full, .rounded-e-none,
      .rounded-tl-full, .rounded-tl-none,
      .rounded-tr-full, .rounded-tr-none,
      .rounded-bl-full, .rounded-bl-none,
      .rounded-br-full, .rounded-br-none,
      .rounded-ss-full, .rounded-ss-none,
      .rounded-se-full, .rounded-se-none,
      .rounded-es-full, .rounded-es-none,
      .rounded-ee-full, .rounded-ee-none {
        corner-shape: round;
      }

      @utility rounded-* {
        border-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-t-* {
        border-top-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-top-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-r-* {
        border-top-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-bottom-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-b-* {
        border-bottom-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-bottom-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-l-* {
        border-top-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-bottom-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-tl-* {
        border-top-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-tr-* {
        border-top-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-bl-* {
        border-bottom-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-br-* {
        border-bottom-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-s-* {
        border-start-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-end-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-e-* {
        border-start-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-end-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-ss-* {
        border-start-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-se-* {
        border-start-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-es-* {
        border-end-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-ee-* {
        border-end-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }

      :root {
        --shape: squircle;
        --shape-multiplier: 1;

          --background: #F7F5F0;
        --foreground: #2B2B2B;
        --primary: #1E7A46;
        --primary-foreground: #FFFFFF;
        --secondary: #E8E5DF;
        --secondary-foreground: #2B2B2B;
        --muted: #EAE8E2;
        --muted-foreground: #6B6B6B;
        --accent: #F0ECE4;
        --accent-foreground: #1E7A46;
        --destructive: #E11D48;
        --card: #FFFFFF;
        --card-foreground: #2B2B2B;
        --popover: #FFFFFF;
        --popover-foreground: #2B2B2B;
        --border: #E5E2DC;
        --input: #FFFFFF;
        --ring: #1E7A46;
        --chart-1: #1E7A46;
        --chart-2: #D97706;
        --chart-3: #059669;
        --chart-4: #DC2626;
        --chart-5: #6B7280;

        --font-sans: "Inter";
        --font-heading: "Inter";
        --font-serif: "Playfair Display";
        --font-mono: "JetBrains Mono";

        --radius: 1rem;
      }

      @supports (corner-shape: squircle) {
        :root {
          --shape-multiplier: 2.5;
        }
      }

      /* Prevent layout shift for icons without explicit dimensions */
      iconify-icon:not([width]):not([height]) {
        display: inline-block;
        width: 1em;
        height: 1em;
      }

      /* Hide scrollbars */
      *,
      *::before,
      *::after {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen bg-background pb-8 font-sans flex flex-col relative">
      <div class="h-64 w-full relative">
        <img
          src="https://ggrhecslgdflloszjkwl.supabase.co/storage/v1/object/public/user-assets/aEjWcRwBSZK/components/kIScNoczfNT.jpeg"
          alt="Fresh produce delivery"
          class="w-full h-full object-cover"
        />
        <div
          class="absolute inset-0 bg-gradient-to-t from-background via-background/60 to-transparent"
        ></div>
      </div>
      <div class="flex-1 px-5 relative z-10 -mt-20 flex flex-col gap-6">
        <div class="space-y-2 text-center">
          <div
            class="inline-flex items-center justify-center px-3 py-1 rounded-full bg-accent text-primary text-[10px] font-bold tracking-wide uppercase mb-2 shadow-sm"
          >
            Step 1 of 2
          </div>
          <h1 class="text-3xl font-heading font-bold text-foreground">Welcome to SupplyWala</h1>
          <p class="text-muted-foreground text-sm">Select your role to get started</p>
        </div>
        <div class="grid grid-cols-2 gap-3 mt-2">
          <button
            class="relative flex flex-col items-center p-4 bg-card rounded-2xl border-2 border-primary shadow-sm text-center transition-all"
          >
            <div class="absolute top-2 right-2 text-primary">
              <iconify-icon icon="ph:check-circle-fill" class="text-xl"></iconify-icon>
            </div>
            <div
              class="w-12 h-12 rounded-full bg-accent text-primary flex items-center justify-center mb-3"
            >
              <iconify-icon icon="ph:storefront-duotone" class="text-2xl"></iconify-icon>
            </div>
            <span class="font-semibold text-foreground text-sm mb-1">Restaurant Buyer</span
            ><span class="text-[10px] text-muted-foreground leading-tight px-1"
              >Buy ingredients for your restaurant</span
            ></button
          ><button
            class="relative flex flex-col items-center p-4 bg-transparent rounded-2xl border-2 border-border text-center hover:bg-muted/30 transition-all opacity-80"
          >
            <div
              class="w-12 h-12 rounded-full bg-muted text-muted-foreground flex items-center justify-center mb-3"
            >
              <iconify-icon icon="ph:truck-duotone" class="text-2xl"></iconify-icon>
            </div>
            <span class="font-semibold text-foreground text-sm mb-1">Wholesale Supplier</span
            ><span class="text-[10px] text-muted-foreground leading-tight px-1"
              >Sell your produce wholesale</span
            >
          </button>
        </div>
        <div class="space-y-5 mt-2">
          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-foreground ml-1">Phone Number</label>
            <div
              class="flex items-center bg-input border border-border rounded-xl focus-within:ring-2 focus-within:ring-primary focus-within:border-transparent transition-all shadow-sm overflow-hidden"
            >
              <div
                class="flex items-center gap-2 pl-3 pr-3 py-3.5 border-r border-border bg-muted/30"
              >
                <span class="text-lg leading-none">🇵🇰</span
                ><span class="text-sm font-semibold text-foreground">+92</span>
              </div>
              <input
                type="tel"
                placeholder="300 1234567"
                class="flex-1 bg-transparent px-3 py-3.5 text-sm font-medium text-foreground placeholder:text-muted-foreground outline-none"
              />
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-foreground ml-1">Password</label>
            <div
              class="flex items-center bg-input border border-border rounded-xl focus-within:ring-2 focus-within:ring-primary focus-within:border-transparent transition-all shadow-sm relative overflow-hidden"
            >
              <div class="pl-3.5 flex items-center justify-center text-muted-foreground">
                <iconify-icon icon="ph:lock-duotone" class="text-xl"></iconify-icon>
              </div>
              <input
                type="password"
                placeholder="••••••••"
                class="flex-1 bg-transparent px-3 py-3.5 text-sm font-medium text-foreground placeholder:text-muted-foreground outline-none"
              /><button
                class="pr-3.5 flex items-center justify-center text-muted-foreground hover:text-foreground transition-colors"
              >
                <iconify-icon icon="ph:eye-duotone" class="text-xl"></iconify-icon>
              </button>
            </div>
            <div class="flex items-center justify-between mt-2 ml-1">
              <div class="flex items-center gap-1.5">
                <div class="h-1 w-8 bg-muted rounded-full"></div>
                <div class="h-1 w-8 bg-muted rounded-full"></div>
                <div class="h-1 w-8 bg-muted rounded-full"></div>
              </div>
              <a href="#" class="text-xs font-semibold text-primary hover:underline"
                >Forgot Password?</a
              >
            </div>
          </div>
        </div>
        <div class="mt-auto pt-6 flex flex-col gap-4">
          <button
            disabled
            class="w-full py-4 rounded-full bg-muted text-muted-foreground font-bold text-sm tracking-wide transition-all flex justify-center items-center shadow-sm"
          >
            SIGN IN
          </button>
          <p class="text-center text-sm text-muted-foreground">
            Don't have an account?
            <a href="#" class="font-bold text-primary hover:underline">Sign Up</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
